<header style="background: #222; color: white; padding: 20px; text-align: center;">
  <h1>Магазин DigitalStop</h1>
</header>

<div style="display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center;">
  <div *ngFor="let p of products" style="border: 1px solid #ccc; padding: 15px; border-radius: 10px; width: 220px; text-align: center; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);">
    <img [src]="p.image" style="width: 100%; height: 180px; object-fit: contain;" alt="фото товара">
    <h3 style="font-size: 1.2em; margin: 10px 0;">{{ p.name }}</h3>
    <p style="font-weight: bold; color: #27ae60;">{{ p.price }} тенге</p>
    <button style="background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
      Купить
    </button>
  </div>
</div>
